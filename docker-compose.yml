
services:
  postgres:
    image: postgres:15-alpine
    container_name: scaas-postgres
    restart: always
    environment:
      POSTGRES_USER: scaas_user
      POSTGRES_PASSWORD: scaas_password
      POSTGRES_DB: scaas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: scaas-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scaas-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://scaas_user:scaas_password@postgres:5432/scaas_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=scaas-production-jwt-super-secret-key-2026
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scaas-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
